name: Forward-port

on:
  pull_request_target:
    types: [closed]

jobs:
  forwardport:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == '19.0'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: korthout/backport-action@v3
        with:
          target_branches: master
          merge_commits: skip
          copy_labels_pattern: '.*'
          pull_title: '[FW] ${pull_title}'
          pull_description: |
            Forward-port of #${pull_number} from `${base_branch}` to `${target_branch}`.

            Original author: @${pull_author}

            ${pull_description}
